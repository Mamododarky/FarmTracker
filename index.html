<style>
:root{--bg:#0a110c;--panel:#111b14;--panel2:#17251b;--line:#304536;--text:#f1f5ef;--muted:#aebcaf;--gold:#f1d36f;--green:#93d37c;--orange:#efb56d;--red:#ef8174}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font:14px/1.35 "Segoe UI",Arial,sans-serif}button,select,input{font:inherit;color:inherit}[hidden]{display:none!important}
.topbar{height:50px;display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:8px;padding:7px 9px;background:#0d1710;border-bottom:1px solid var(--line)}
h1{margin:0;font-size:16px}.icon-button{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);font-size:20px;cursor:pointer}.run-clock{padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-weight:800;font-variant-numeric:tabular-nums;font-size:13px}
main{padding:8px}.button{border:1px solid var(--line);border-radius:8px;background:#1a2920;padding:9px 11px;font-weight:800;font-size:13px;cursor:pointer}.button.primary{background:linear-gradient(#f6de83,#dfb94f);border-color:#f0d06e;color:#251b07}.button.warning{background:#49391e;border-color:#80632f;color:#ffd58e}.button.danger{color:#ffaaa1}.button.small{padding:7px 9px;font-size:12px}.text-button{border:0;background:none;color:var(--gold);font-weight:900;cursor:pointer;padding:3px;font-size:12px}

.card{border:1px solid var(--line);border-radius:11px;background:linear-gradient(#142118,#101a13);padding:12px}.home{display:grid;gap:11px}.home h2{margin:0;font-size:22px}.label{display:grid;gap:5px;text-align:left}.label span{font-weight:800;font-size:12px;color:var(--muted)}select,input[type=number]{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--panel2)}.home-actions{display:flex;gap:7px}.home-actions .primary{flex:1}.resume-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
.seed-config{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:9px;border:1px solid var(--line);border-radius:9px;background:#0e1811}.seed-config .label span{font-size:11px}.seed-config select{padding:8px;font-size:13px}.seed-summary{grid-column:1/-1;margin:0;color:var(--muted);font-size:11px}.seed-summary b{color:var(--gold)}

.info{display:grid;gap:6px;margin-top:10px}.info-row{padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#101a13}.info-row.accent{border-color:#6f612c;background:#1d2113}.info-row small{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.09em;text-transform:uppercase}.info-row b{display:block;margin-top:2px;font-size:14px}.info-row p{margin:3px 0 0;color:var(--muted);font-size:12px}.row-head{display:flex;justify-content:space-between;gap:8px}
.controls{position:sticky;bottom:0;display:grid;grid-template-columns:.72fr .72fr 1.45fr;gap:6px;padding-top:8px;background:linear-gradient(transparent,#101a13 28%)}.controls .button{padding:10px 5px}
.pof-box{margin-top:7px;padding:8px;border:1px solid var(--line);border-radius:8px}.pof-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.pof-title b{font-size:14px}.pof-list{display:grid;gap:5px}.pof-row{display:grid;grid-template-columns:minmax(0,1fr) 104px;gap:6px;align-items:center;padding:7px;border:1px solid #293b2e;border-radius:7px}.pof-main{display:flex;gap:6px;align-items:center;min-width:0}.pof-main strong{display:block;font-size:13px}.pof-main small{display:block;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pof-row select{padding:5px;font-size:12px}
.side-menu{position:fixed;left:0;top:0;bottom:0;z-index:50;width:min(290px,92vw);padding:14px;background:#0f1912;border-right:1px solid var(--line);transform:translateX(-103%);transition:.15s;overflow:auto}.side-menu.open{transform:none}.menu-head{display:flex;justify-content:space-between;align-items:center}.menu-head h2{margin:0;font-size:18px}.menu-section{display:grid;gap:7px;padding:13px 0;border-bottom:1px solid var(--line)}.menu-section h3{margin:0;font-size:13px}.timer-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.timer-inputs label{display:grid;gap:3px;font-size:10px;color:var(--muted)}.timer-inputs input{padding:7px}.scrim{position:fixed;inset:0;z-index:40;background:#000a}
.modal{width:min(410px,calc(100vw - 10px));border:0;padding:0;background:transparent;color:var(--text)}.modal::backdrop{background:#000b}.modal-card{max-height:calc(100vh - 10px);overflow:auto;padding:11px;border:1px solid var(--line);border-radius:10px;background:#0f1912}.modal-card>header{position:sticky;top:-11px;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:9px 0;background:#0f1912;border-bottom:1px solid var(--line)}.modal-card h2{margin:0;font-size:18px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:8px 0}.tab{padding:8px;border:1px solid var(--line);border-radius:7px;background:var(--panel2);font-weight:800}.tab.active{color:var(--gold);border-color:#79692f}.timer-grid{display:grid;gap:5px}.timer-card{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;padding:8px;border:1px solid var(--line);border-radius:7px;background:var(--panel)}.timer-card b{display:block;font-size:13px}.timer-card small{display:block;color:var(--muted);font-size:11px}.timer-card strong{text-align:right;font-size:13px}.status-alarm{border-color:var(--red)}.status-growing{border-color:#477052}.status-ready{border-color:#68756b}.dialog-actions{display:flex;gap:6px;margin:8px 0}.jump-list{display:grid;gap:5px;margin-top:8px}.jump-item{display:grid;grid-template-columns:28px minmax(0,1fr);gap:7px;text-align:left;padding:8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--text)}.jump-item b{font-size:13px}.jump-item small{display:block;color:var(--muted);font-size:11px}.jump-num{display:grid;place-items:center;width:27px;height:27px;border-radius:6px;background:#1b2a20;color:var(--gold);font-weight:900}

</style>

<body>
<header class="topbar"><button id="menuBtn" class="icon-button">☰</button><h1>Farm Tracker</h1><span id="runClock" class="run-clock" hidden>00:00</span></header>
<aside id="menu" class="side-menu"><div class="menu-head"><h2>Tracker</h2><button id="closeMenu" class="icon-button">×</button></div>
<section class="menu-section"><button id="menuTimers" class="button">View timers</button><button id="menuInventory" class="button">Inventory</button><button id="menuJump" class="button">Jump to step</button></section>
<section class="menu-section"><h3>Farm seeds</h3><small id="menuSeedSummary" style="color:var(--muted)">Set on the start screen.</small></section>
<section class="menu-section"><button id="enableSound" class="button">Enable sound</button><button id="resetTimers" class="button danger">Reset all timers</button></section>
<small style="color:var(--muted)">Build 9.2</small></aside><div id="scrim" class="scrim" hidden></div>
<main>
<div id="alarmBar" class="alarm-bar"><span>🔔</span><span class="alarm-copy"><b id="alarmCount">0 active alarms</b><small id="nextReady">No timers set</small></span><span class="alarm-actions"><button id="viewTimers" class="button small">Timers</button><button id="snooze" class="button small warning">Snooze 1h</button></span></div>
<section id="home" class="card home"><h2>Choose a run</h2><label class="label"><span>Run type</span><select id="routeSelect">
<option value="" selected disabled>Select a run…</option>
<option value="all">All Farm/Tree Run</option>
<option value="farm">Farm Run</option>
<option value="tree">Tree Run — Fruit, Magic &amp; Elder</option></select></label><section id="seedConfig" class="seed-config"><label class="label"><span>Herb seed</span><select id="herbSeed"></select></label><label class="label"><span>Flower seed</span><select id="flowerSeed"></select></label><p id="seedSummary" class="seed-summary"></p></section><div class="home-actions"><button id="startRun" class="button primary">Start Run</button><button id="homeTimers" class="button">Timers</button></div><div id="resumeRow" class="resume-row" hidden><span>Unfinished run saved</span><button id="resumeRun" class="text-button">Resume</button></div></section>
<section id="runner" class="card" hidden><div class="run-meta"><b id="routeName">Run</b><span id="progress">1 / 1</span></div><div class="step-head"><div><span id="group" class="badge">Patch</span><h2 id="location">Location</h2><p id="patchType">Patch type</p></div><span id="stepNumber" class="step-number">STEP 1</span></div><div class="info"><div class="info-row accent"><div class="row-head"><small>Teleport</small><button id="copyTeleport" class="text-button">Copy</button></div><b id="teleport"></b><p id="directions"></p></div><div class="info-row"><small>Do</small><b id="plant"></b><p id="timerText"></p></div></div><section id="pofBox" class="pof-box" hidden><div class="pof-title"><b>Replaced pens</b><button id="selectAllPens" class="text-button">All</button></div><div id="pofList" class="pof-list"></div></section><div class="controls"><button id="prev" class="button">Previous</button><button id="skip" class="button warning">Skip</button><button id="complete" class="button primary">Complete + Next</button></div></section>
</main>
<dialog id="timersDialog" class="modal"><div class="modal-card"><header><h2>Timers</h2><button class="icon-button" data-close>×</button></header><div class="tabs"><button id="plotTab" class="tab active">Plots & Trees</button><button id="pofTab" class="tab">Manor Farm</button></div><div class="dialog-actions"><button id="dialogReset" class="button danger small">Reset all timers</button></div><section id="plotPanel"><div id="plotTimers" class="timer-grid"></div></section><section id="pofPanel" hidden><div id="pofTimers" class="timer-grid"></div></section></div></dialog>
<dialog id="jumpDialog" class="modal"><div class="modal-card"><header><h2>Jump</h2><button class="icon-button" data-close>×</button></header><div id="jumpList" class="jump-list"></div></div></dialog>
<dialog id="inventoryDialog" class="modal"><div class="modal-card"><header><h2>Inventory</h2><button class="icon-button" data-close>×</button></header><div class="inventory-layout"><div id="inventory" class="rs3-inventory"></div><p id="inventoryNote" class="inventory-note"></p></div></div></dialog>
<div id="toast" class="toast"></div>

function openTimers(){renderTimers();els.timersDialog.showModal();closeMenu()}function tabs(plot){$('plotPanel').hidden=!plot;$('pofPanel').hidden=plot;$('plotTab').classList.toggle('active',plot);$('pofTab').classList.toggle('active',!plot)}
function renderTimers(){const now=Date.now();$('plotTimers').innerHTML='';const vals=Object.values(timers).sort((a,b)=>a.readyAt-b.readyAt);if(!vals.length)$('plotTimers').innerHTML='<p class="inventory-note">No plot or tree timers.</p>';for(const t of vals){const ready=t.readyAt<=now;const alarm=ready&&!t.ack;const card=document.createElement('div');card.className=`timer-card status-${alarm?'alarm':ready?'ready':'growing'}`;card.innerHTML=`<span><b>${esc(t.label)}</b><small>${esc(t.type)}</small></span><strong>${ready?'READY':formatRemaining(t.readyAt-now)}</strong>`;$('plotTimers').appendChild(card)}$('pofTimers').innerHTML='';for(const pen of POF_PENS){const t=pofTimers[pen.id];const card=document.createElement('div');card.className='timer-card';if(!t){card.innerHTML=`<span><b>${esc(pen.name)}</b><small>${esc(pen.animal)}</small></span><strong>Not set</strong>`}else{const next=(t.stages||[]).find(s=>s.due>now)||[...(t.stages||[])].reverse().find(s=>!s.ack);if(next){const ready=next.due<=now;card.classList.add(ready?'status-alarm':'status-growing');card.innerHTML=`<span><b>${esc(pen.name)}</b><small>${esc(pen.animal)} · ${cap(next.name)}</small></span><strong>${ready?'READY':formatRemaining(next.due-now)}</strong>`}else card.innerHTML=`<span><b>${esc(pen.name)}</b><small>${esc(pen.animal)}</small></span><strong>Elder</strong>`}$('pofTimers').appendChild(card)}}
function openJump(){if(!active){toast('Start a run first.');return}$('jumpList').innerHTML='';activeRoute().forEach((s,i)=>{const b=document.createElement('button');b.className='jump-item';b.innerHTML=`<span class="jump-num">${i+1}</span><span><b>${esc(s.location)}</b><small>${esc(s.patchType)}</small></span>`;b.onclick=()=>{active.index=i;save(STORE.active,active);renderStep();els.jumpDialog.close()};$('jumpList').appendChild(b)});els.jumpDialog.showModal();closeMenu()}
function openInventory(){const route=active?activeRoute():routeFor(els.routeSelect.value);const slots=buildInventory(route);$('inventory').innerHTML='';slots.slice(0,28).forEach((s,i)=>{const p=inventoryPos(i),d=document.createElement('div');d.className='slot';d.style.left=p.left+'px';d.style.top=p.top+'px';const img=document.createElement('img');img.src=itemUrl(s.item);img.alt=s.item;d.appendChild(img);if(s.qty>1){const q=document.createElement('span');q.className='qty';q.textContent=s.qty;d.appendChild(q)}$('inventory').appendChild(d)});$('inventoryNote').textContent=route.some(x=>x.kind==='farm')?`${selectedSeed('herb').label} and ${selectedSeed('flower').label} are included for the farm patches.`:'Tree saplings and noted protection items for the selected route.';els.inventoryDialog.showModal();closeMenu()}
function buildInventory(route){const c=new Map(),add=(i,q=1)=>{if(i)c.set(i,(c.get(i)||0)+q)};for(const s of route){if(s.inventoryType==='individual'||s.inventoryType==='stack')add(s.inventoryItem,1);if(Number(s.paymentQty)>0)add(s.paymentItem,Number(s.paymentQty))}if(route.some(x=>x.kind==='farm')){add(selectedSeed('herb').label,route.filter(x=>x.kind==='farm'&&(x.patchKinds||[]).includes('herb')).length);add(selectedSeed('flower').label,route.filter(x=>x.kind==='farm'&&(x.patchKinds||[]).includes('flower')).length)}if(route.some(x=>x.kind==='tree')){add('Grasping rune pouch');add('Urn enhancer');add('Exquisite farming urn')}const order=[selectedSeed('herb').label,selectedSeed('flower').label,'Magic sapling','Carambola sapling','Calquat sapling','Elder sapling','Golden dragonfruit seed','Noted coconuts','Noted dragonfruit','Noted poison ivy berries','Noted morchella mushrooms','Noted guarana fruit','Grasping rune pouch','Urn enhancer','Exquisite farming urn'];const out=[];for(const item of [...new Set(order)]){const qty=c.get(item)||0;if(!qty)continue;if(['Magic sapling','Carambola sapling','Calquat sapling','Elder sapling'].includes(item)){for(let i=0;i<qty;i++)out.push({item,qty:1})}else out.push({item,qty})}return out}
function inventoryPos(i){const left=[35,74,114,153,193],row=i<25?Math.floor(i/5):5,col=i<25?i%5:i-25;return{left:left[col],top:18+row*36}}function itemUrl(i){if(ITEM_SPRITES[i])return`https://secure.runescape.com/m=itemdb_rs/obj_sprite.gif?id=${ITEM_SPRITES[i].id}`;return`https://runescape.wiki/w/Special:Redirect/file/${encodeURIComponent(String(i).replaceAll(' ','_'))}.png`}
function copyTeleport(){const s=current();if(!s)return;navigator.clipboard?.writeText(`${s.teleport} — ${s.directions}`).then(()=>toast('Copied.')).catch(()=>toast('Copy failed.'))}
function armAudio(){if(!audioCtx)try{audioCtx=new (window.AudioContext||window.webkitAudioContext)()}catch{}if(audioCtx?.state==='suspended')audioCtx.resume()}function enableSound(){armAudio();playTone();toast('Sound enabled.')}
function playTone(){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=740;g.gain.setValueAtTime(.0001,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.18,audioCtx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.35);o.start();o.stop(audioCtx.currentTime+.36)}function playAlarm(){armAudio();if(!audioCtx)return;playTone();setTimeout(playTone,430)}
function formatRemaining(ms){if(ms<=0)return'now';const m=Math.ceil(ms/60000),d=Math.floor(m/1440),h=Math.floor((m%1440)/60),min=m%60;if(d)return`${d}d ${h}h`;if(h)return`${h}h ${min}m`;return`${min}m`}function formatDuration(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`}function cap(s){return String(s).charAt(0).toUpperCase()+String(s).slice(1)}
let toastTimer;function toast(t){clearTimeout(toastTimer);$('toast').textContent=t;$('toast').classList.add('show');toastTimer=setTimeout(()=>$('toast').classList.remove('show'),2000)}
setTimeout(init,0);
</script></body></html>
